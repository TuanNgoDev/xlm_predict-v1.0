<!DOCTYPE html>
<html>
<head>
  <title>Network Debug</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
    .info { background: #2a2a2a; padding: 15px; margin: 10px 0; border-left: 3px solid #0f0; }
    .error { border-left-color: #f00; color: #f00; }
    button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; }
  </style>
</head>
<body>
  <h1>🌐 XLMPredict Network Debug</h1>
  
  <div class="info">
    <h3>Expected Configuration (Testnet)</h3>
    <div>Contract ID: CBRDGUS3QS7T2RALO7K3MSVJVYBMNRLJCR26RBJFXR7MNNUWHUI762KE</div>
    <div>RPC: https://soroban-testnet.stellar.org</div>
    <div>Network: Test SDF Network ; September 2015</div>
  </div>

  <button onclick="checkFreighter()">Check Freighter</button>
  <button onclick="checkConfig()">Check App Config</button>
  <button onclick="fundAccount()">Fund My Account</button>

  <div id="output"></div>

  <script type="module">
    import { CONTRACT_ID, RPC_URL, NETWORK_PASSPHRASE } from './services/contract.ts';
    import { getFreighterAddress } from './services/wallet.ts';

    window.checkConfig = () => {
      const output = document.getElementById('output');
      output.innerHTML = `
        <div class="info">
          <h3>App Configuration</h3>
          <div>CONTRACT_ID: ${CONTRACT_ID}</div>
          <div>RPC_URL: ${RPC_URL}</div>
          <div>NETWORK_PASSPHRASE: ${NETWORK_PASSPHRASE}</div>
          <div>Is Testnet: ${NETWORK_PASSPHRASE.includes('Test') ? '✅ YES' : '❌ NO (MAINNET!)'}</div>
        </div>
      `;
    };

    window.checkFreighter = async () => {
      const output = document.getElementById('output');
      try {
        const { isConnected, getNetworkDetails } = await import('@stellar/freighter-api');
        const conn = await isConnected();
        
        if (!conn.isConnected) {
          output.innerHTML = '<div class="info error">❌ Freighter not connected</div>';
          return;
        }

        const address = await getFreighterAddress();
        const network = await getNetworkDetails();
        
        output.innerHTML = `
          <div class="info">
            <h3>Freighter Status</h3>
            <div>Connected: ✅ YES</div>
            <div>Address: ${address}</div>
            <div>Network: ${network.network}</div>
            <div>Network Passphrase: ${network.networkPassphrase}</div>
            <div>Matches App: ${network.networkPassphrase === NETWORK_PASSPHRASE ? '✅ YES' : '❌ NO'}</div>
          </div>
        `;
      } catch (err) {
        output.innerHTML = `<div class="info error">❌ Error: ${err.message}</div>`;
      }
    };

    window.fundAccount = async () => {
      const output = document.getElementById('output');
      try {
        const address = await getFreighterAddress();
        if (!address) {
          output.innerHTML = '<div class="info error">❌ No Freighter address found</div>';
          return;
        }

        output.innerHTML = '<div class="info">⏳ Funding account...</div>';
        
        const response = await fetch(`https://friendbot.stellar.org?addr=${address}`);
        const data = await response.json();
        
        output.innerHTML = `
          <div class="info">
            <h3>✅ Account Funded!</h3>
            <div>Address: ${address}</div>
            <div>Check at: <a href="https://stellar.expert/explorer/testnet/account/${address}" target="_blank">Stellar Expert</a></div>
          </div>
        `;
      } catch (err) {
        output.innerHTML = `<div class="info error">❌ Error: ${err.message}</div>`;
      }
    };

    // Auto-check on load
    window.checkConfig();
  </script>
</body>
</html>
