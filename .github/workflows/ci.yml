name: XLMPredict CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Test and Build Backend Server
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Run Type Checking
        run: |
          cd server
          npx tsc --noEmit

      - name: Run Backend Tests
        run: |
          cd server
          npm run test:unit
          npm run test:property

  # Job 2: Build Frontend App (Vercel Compatibility check)
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Frontend Application
        run: npm run build

  # Job 3: Test and Build Soroban Smart Contract
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Run Contract Tests and Build
        run: |
          cd contracts/prediction_pool
          cargo check --target wasm32-unknown-unknown
          cargo test
          cargo build --target wasm32-unknown-unknown --release
